<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语珠辉 | 李昕玥专属命理分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #f2c94c;
            --bg-dark: #0f141a;
            --text-white: #f8f9fa;
            --accent-glow: rgba(242, 201, 76, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 120px 20px 60px;
            overflow-y: auto;
            overflow-x: hidden;
            background: #0d1117;
            position: relative;
        }

        #canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(242, 201, 76, 0.2);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            z-index: 1;
            animation: containerFade 1.2s ease-out;
        }

        /* 能量条样式 */
        .energy-container {
            margin: 30px 0;
            display: flex;
            justify-content: space-around;
        }
        .energy-item {
            text-align: center;
            width: 30%;
        }
        .energy-bar-bg {
            height: 4px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 2px;
            margin-top: 10px;
            overflow: hidden;
        }
        .energy-bar-fill {
            height: 100%;
            background: var(--primary-gold);
            width: 0%;
            transition: width 2s ease-out;
            box-shadow: 0 0 10px var(--primary-gold);
        }

        /* 抽签弹窗样式 */
        #fortune-modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 100;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(10px);
        }
        .modal-content {
            background: var(--bg-dark);
            border: 2px solid var(--primary-gold);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            max-width: 400px;
            width: 80%;
            transform: scale(0.8);
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .modal-content.active {
            transform: scale(1);
            opacity: 1;
        }
        .fortune-result {
            font-size: 3rem;
            color: var(--primary-gold);
            margin: 20px 0;
            letter-spacing: 10px;
            font-weight: bold;
        }
        .fortune-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #ccc;
        }

        /* 智慧阁样式 */
        .wisdom-section {
            margin-top: 40px;
            padding-top: 30px;
            border-top: 1px solid rgba(242, 201, 76, 0.1);
        }
        .wisdom-title {
            color: var(--primary-gold);
            font-size: 1.2rem;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .wisdom-input {
            width: 100%;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(242, 201, 76, 0.3);
            border-radius: 12px;
            padding: 15px;
            color: white;
            font-family: inherit;
            resize: none;
            outline: none;
            transition: border-color 0.3s;
        }
        .wisdom-input:focus {
            border-color: var(--primary-gold);
            box-shadow: 0 0 10px rgba(242, 201, 76, 0.2);
        }
        #wisdom-result {
            margin-top: 20px;
            padding: 15px;
            background: rgba(242, 201, 76, 0.05);
            border-radius: 10px;
            font-size: 0.95rem;
            color: #ddd;
            display: none;
            line-height: 1.6;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes containerFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .portrait-container {
            width: 140px;
            height: 140px;
            margin: -90px auto 20px;
            position: relative;
            z-index: 2;
        }

        .portrait {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            box-shadow: 0 0 30px var(--accent-glow);
            background: #1c252e;
        }

        .portrait-container::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px dashed var(--primary-gold);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: var(--primary-gold);
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .char-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.8s ease-out;
        }

        .char-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .char-symbol {
            font-size: 2.5rem;
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 25px;
            border-radius: 12px;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px var(--accent-glow);
        }

        .char-info h3 {
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .char-info p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(248, 249, 252, 0.8);
        }

        .summary {
            margin-top: 45px;
            padding: 25px;
            background: rgba(242, 201, 76, 0.05);
            border-left: 3px solid var(--primary-gold);
            border-radius: 4px;
            font-style: italic;
            text-align: center;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .summary.visible { opacity: 1; }

        .btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            font-family: inherit;
            display: block;
            margin-left: auto;
            margin-right: auto;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--primary-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }
    </style>
</head>

        <h1>星语珠辉</h1>
        
        <div id="content">
            <div class="char-item" style="transition-delay: 0.3s;">
                <div class="char-symbol">李</div>
                <div class="char-info">
                    <h3>根基稳固</h3>
                    <p>五行属木，象征生命力与传承。预示家族荫蔽，根深叶茂，能在波澜中守住初心。</p>
                </div>
            </div>

            <div class="char-item" style="transition-delay: 1.1s;">
                <div class="char-symbol">昕</div>
                <div class="char-info">
                    <h3>破晓之光</h3>
                    <p>五行属火，日出之象。象征希望与光明，寓意前途灿烂，总能抢占先机，引领风气之先。</p>
                </div>
            </div>

            <div class="char-item" style="transition-delay: 1.9s;">
                <div class="char-symbol">玥</div>
                <div class="char-info">
                    <h3>神珠显赫</h3>
                    <p>五行属金，神话之珠。代表高贵、圆满与内敛的锋芒。在人群中如明珠般璀璨，受人尊崇。</p>
                </div>
            </div>

            <div class="summary" id="summary">
            「木火通明，明珠出海」：昕玥之名，如晨曦照耀神珠，<br>
            预示一生福泽深厚，既有破晓之锐气，亦有宝珠之华贵，<br>
            前程锦绣，万事圆满。
        </div>

        <!-- 能量条区域 -->
        <div class="energy-container">
            <div class="energy-item">
                <div style="color:#f2c94c">木 (李)</div>
                <div class="energy-bar-bg"><div id="bar-wood" class="energy-bar-fill"></div></div>
            </div>
            <div class="energy-item">
                <div style="color:#ff4757">火 (昕)</div>
                <div class="energy-bar-bg"><div id="bar-fire" class="energy-bar-fill"></div></div>
            </div>
            <div class="energy-item">
                <div style="color:#dfe4ea">金 (玥)</div>
                <div class="energy-bar-bg"><div id="bar-gold" class="energy-bar-fill"></div></div>
            </div>
        </div>

        <button class="btn" onclick="drawFortune()">立即抽取今日灵签</button>
        
        <!-- 智慧阁模块 -->
        <div class="wisdom-section">
            <div class="wisdom-title">✨ 昕玥智慧阁</div>
            <textarea class="wisdom-input" id="wisdom-input" placeholder="输入你想请教的难题或算式..." rows="3"></textarea>
            <button class="btn" style="background:transparent; border:1px solid var(--primary-gold); margin-top:10px; font-size:0.9rem" onclick="seekWisdom()">向明珠求教</button>
            <div id="wisdom-result"></div>
        </div>

        <button class="btn" style="opacity:0.5; margin-top:20px" onclick="location.reload()">重新开启分析</button>
    </div>

    <!-- 抽签弹窗 -->
    <div id="fortune-modal" onclick="closeModal()">
        <div class="modal-content" id="modal-content">
            <div style="color:var(--primary-gold)">—— 今日灵签 ——</div>
            <div class="fortune-result" id="fortune-res">大吉</div>
            <div class="fortune-text" id="fortune-desc"></div>
            <div style="margin-top:30px; font-size:0.8rem; color:#666">点击空白处关闭</div>
        </div>
    </div>

    <footer>© 2026 命理精研 | 专为 李昕玥 设计</footer>

    <script>
        // 1. 初始动画加载
        window.onload = () => {
            const items = document.querySelectorAll('.char-item');
            const summary = document.getElementById('summary');
            
            items.forEach(item => item.classList.add('visible'));
            
            setTimeout(() => {
                summary.classList.add('visible');
                // 能量条加载
                document.getElementById('bar-wood').style.width = '95%';
                document.getElementById('bar-fire').style.width = '98%';
                document.getElementById('bar-gold').style.width = '92%';
            }, 2700);

            initParticles();
        };

        // 2. 抽签逻辑
        function drawFortune() {
            const fortunes = [
                { res: "大吉", desc: "昕光普照，万事亨通。今日不仅是你的主场，更是明珠闪耀之时。" },
                { res: "上进", desc: "晨曦已至，玥影随行。保持内心的纯粹，机会正向你招手。" },
                { res: "顺遂", desc: "木火通明之势已成。只需静待时机，美好不期而遇。" },
                { res: "如意", desc: "神珠内敛，静水流深。今日适合处理重要决策，直觉极准。" },
                { res: "显赫", desc: "贵人运极佳。你的才华如昕玥般璀璨，必将获得应有的认可。" }
            ];
            
            const random = fortunes[Math.floor(Math.random() * fortunes.length)];
            document.getElementById('fortune-res').innerText = random.res;
            document.getElementById('fortune-desc').innerText = random.desc;
            
            const modal = document.getElementById('fortune-modal');
            const content = document.getElementById('modal-content');
            modal.style.display = 'flex';
            setTimeout(() => content.classList.add('active'), 10);
        }

        function closeModal() {
            const content = document.getElementById('modal-content');
            content.classList.remove('active');
            setTimeout(() => {
                document.getElementById('fortune-modal').style.display = 'none';
            }, 500);
        }

        // 3. 智慧阁解答逻辑
        function seekWisdom() {
            const input = document.getElementById('wisdom-input').value.trim();
            const resDiv = document.getElementById('wisdom-result');
            
            if (!input) return;

            resDiv.style.display = 'block';
            resDiv.innerHTML = "<span style='color:var(--primary-gold)'>正在为您拨动神珠灵感...</span>";

            setTimeout(() => {
                // 检查是否为数学表达式
                let resultText = "";
                try {
                    // 仅允许基础数学运算以保证安全
                    if (/^[\d+\-*/().\s]+$/.test(input)) {
                        const calculated = eval(input);
                        resultText = `<b>神珠拨算结果：</b> <span style='color:var(--primary-gold); font-size:1.2rem'>${calculated}</span><br><br><small>“万物皆数，木火通明之势助你思路清晰。”</small>`;
                    } else {
                        const tips = [
                            "此题关键在于‘破晓’之势，试着从头审视最基础的定义。",
                            "玥珠内敛，建议你静心默读题目三遍，答案自会浮现。",
                            "与其苦思冥想，不如借‘木’之稳健，先列出所有已知条件。",
                            "灵感如‘火’，此刻不宜强攻，稍作休息，答案会自然跳出。",
                            "题意如海，昕玥如珠。试着把复杂问题拆解成几个小珠子来解决。",
                            "‘木火通明’预示你此刻逻辑感极强，顺着直觉去推演试试。"
                        ];
                        const randomTip = tips[Math.floor(Math.random() * tips.length)];
                        resultText = `<b>明珠启思：</b><br>${randomTip}`;
                    }
                } catch (e) {
                    resultText = "明珠略有蒙尘，请检查您的算式是否正确输入。";
                }
                resDiv.innerHTML = resultText;
            }, 1000);
        }

        // 4. 背景粒子效果
        function initParticles() {
            const canvas = document.getElementById('canvas');
            const ctx = canvas.getContext('2d');
            let particles = [];

            function resize() {
                canvas.width = window.innerWidth;
                canvas.height = window.innerHeight;
            }
            window.onresize = resize;
            resize();

            class Particle {
                constructor() {
                    this.reset();
                }
                reset() {
                    this.x = Math.random() * canvas.width;
                    this.y = Math.random() * canvas.height;
                    this.size = Math.random() * 2;
                    this.speedX = Math.random() * 0.5 - 0.25;
                    this.speedY = Math.random() * 0.5 - 0.25;
                    this.alpha = Math.random() * 0.5;
                }
                update() {
                    this.x += this.speedX;
                    this.y += this.speedY;
                    if (this.x < 0 || this.x > canvas.width || this.y < 0 || this.y > canvas.height) {
                        this.reset();
                    }
                }
                draw() {
                    ctx.fillStyle = `rgba(242, 201, 76, ${this.alpha})`;
                    ctx.beginPath();
                    ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
                    ctx.fill();
                }
            }

            for (let i = 0; i < 100; i++) particles.push(new Particle());

            function animate() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);
                particles.forEach(p => {
                    p.update();
                    p.draw();
                });
                requestAnimationFrame(animate);
            }
            animate();
        }
    </script>
</body>
