<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>星语珠辉 | 李昕玥专属命理分析</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-gold: #f2c94c;
            --bg-dark: #0f141a;
            --text-white: #f8f9fa;
            --accent-glow: rgba(242, 201, 76, 0.3);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Noto Serif SC', serif;
            background-color: var(--bg-dark);
            color: var(--text-white);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            background: radial-gradient(circle at center, #1c252e 0%, #0f141a 100%);
        }

        .container {
            max-width: 600px;
            width: 90%;
            background: rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(242, 201, 76, 0.2);
            border-radius: 24px;
            padding: 50px 40px;
            box-shadow: 0 25px 50px rgba(0, 0, 0, 0.6);
            position: relative;
            animation: containerFade 1.2s ease-out;
        }

        @keyframes containerFade {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .portrait-container {
            width: 140px;
            height: 140px;
            margin: -90px auto 20px;
            position: relative;
            z-index: 2;
        }

        .portrait {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 50%;
            border: 3px solid var(--primary-gold);
            box-shadow: 0 0 30px var(--accent-glow);
            background: #1c252e;
        }

        .portrait-container::after {
            content: '';
            position: absolute;
            inset: -8px;
            border-radius: 50%;
            border: 1px dashed var(--primary-gold);
            animation: rotate 15s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        h1 {
            color: var(--primary-gold);
            text-align: center;
            font-size: 2.8rem;
            margin-bottom: 40px;
            letter-spacing: 8px;
            text-shadow: 0 0 20px var(--accent-glow);
        }

        .char-item {
            display: flex;
            align-items: center;
            margin-bottom: 25px;
            opacity: 0;
            transform: translateX(-20px);
            transition: all 0.8s ease-out;
        }

        .char-item.visible {
            opacity: 1;
            transform: translateX(0);
        }

        .char-symbol {
            font-size: 2.5rem;
            color: var(--primary-gold);
            border: 2px solid var(--primary-gold);
            width: 70px;
            height: 70px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-right: 25px;
            border-radius: 12px;
            flex-shrink: 0;
            box-shadow: inset 0 0 10px var(--accent-glow);
        }

        .char-info h3 {
            color: var(--primary-gold);
            margin-bottom: 5px;
            font-size: 1.2rem;
        }

        .char-info p {
            font-size: 1rem;
            line-height: 1.6;
            color: rgba(248, 249, 252, 0.8);
        }

        .summary {
            margin-top: 45px;
            padding: 25px;
            background: rgba(242, 201, 76, 0.05);
            border-left: 3px solid var(--primary-gold);
            border-radius: 4px;
            font-style: italic;
            text-align: center;
            line-height: 1.8;
            opacity: 0;
            transition: opacity 1.5s ease-in;
        }

        .summary.visible { opacity: 1; }

        .btn {
            margin-top: 40px;
            background: transparent;
            border: 1px solid var(--primary-gold);
            color: var(--primary-gold);
            padding: 14px 40px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.4s;
            font-family: inherit;
            display: block;
            margin-left: auto;
            margin-right: auto;
            font-size: 1rem;
            letter-spacing: 2px;
        }

        .btn:hover {
            background: var(--primary-gold);
            color: var(--bg-dark);
            box-shadow: 0 0 25px var(--accent-glow);
        }

        footer {
            position: absolute;
            bottom: 20px;
            width: 100%;
            text-align: center;
            color: rgba(255, 255, 255, 0.2);
            font-size: 0.8rem;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="portrait-container">
            <img src="PastedGraphic.png" alt="李昕玥" class="portrait">
        </div>
        <h1>星语珠辉</h1>
        
        <div id="content">
            <div class="char-item" style="transition-delay: 0.3s;">
                <div class="char-symbol">李</div>
                <div class="char-info">
                    <h3>根基稳固</h3>
                    <p>五行属木，象征生命力与传承。预示家族荫蔽，根深叶茂，能在波澜中守住初心。</p>
                </div>
            </div>

            <div class="char-item" style="transition-delay: 1.1s;">
                <div class="char-symbol">昕</div>
                <div class="char-info">
                    <h3>破晓之光</h3>
                    <p>五行属火，日出之象。象征希望与光明，寓意前途灿烂，总能抢占先机，引领风气之先。</p>
                </div>
            </div>

            <div class="char-item" style="transition-delay: 1.9s;">
                <div class="char-symbol">玥</div>
                <div class="char-info">
                    <h3>神珠显赫</h3>
                    <p>五行属金，神话之珠。代表高贵、圆满与内敛的锋芒。在人群中如明珠般璀璨，受人尊崇。</p>
                </div>
            </div>

            <div class="summary" id="summary">
                「木火通明，明珠出海」：昕玥之名，如晨曦照耀神珠，<br>
                预示一生福泽深厚，既有破晓之锐气，亦有宝珠之华贵，<br>
                前程锦绣，万事圆满。
            </div>
        </div>

        <button class="btn" onclick="location.reload()">再次探索运势</button>
    </div>

    <footer>© 2026 命理精研 | 专为 李昕玥 设计</footer>

    <script>
        window.onload = () => {
            const items = document.querySelectorAll('.char-item');
            const summary = document.getElementById('summary');
            
            items.forEach(item => item.classList.add('visible'));
            
            setTimeout(() => {
                summary.classList.add('visible');
            }, 2700);
        };
    </script>
</body>
</html>
